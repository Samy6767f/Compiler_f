<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Compiler</title>
  <style>
    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --surface2: #1f2937;
      --border: #374151;
      --text: #f9fafb;
      --text-dim: #9ca3af;
      --green: #10b981;
      --green-glow: #34d399;
      --teal: #14b8a6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container { width: 100%; max-width: 600px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--green), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }

    #prompt {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      resize: vertical;
      min-height: 100px;
      transition: border-color 0.2s;
    }

    #prompt:focus { outline: none; border-color: var(--green); }

    #forgeBtn {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      background: linear-gradient(135deg, var(--green), var(--teal));
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }

    #forgeBtn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 30px -5px rgba(16, 185, 129, 0.4);
    }

    #forgeBtn:disabled { opacity: 0.6; cursor: not-allowed; }

    .stages {
      display: flex;
      gap: 8px;
      margin-top: 24px;
      justify-content: center;
    }

    .stage-pill {
      padding: 6px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-dim);
      transition: all 0.3s;
    }

    .stage-pill.active {
      background: rgba(16, 185, 129, 0.15);
      border-color: var(--green);
      color: var(--green);
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
    }

    .stage-pill.done {
      background: rgba(16, 185, 129, 0.25);
      border-color: var(--green);
      color: var(--green);
    }

    .progress-container {
      width: 100%;
      margin-top: 20px;
      background: var(--surface2);
      border-radius: 10px;
      overflow: hidden;
      height: 8px;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green), var(--green-glow), var(--green));
      background-size: 200% 100%;
      transition: width 0.4s ease-out;
      position: relative;
      border-radius: 10px;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: -7px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 20px var(--green), 0 0 40px var(--green-glow);
      animation: pulseGlow 1.5s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.8; transform: translateY(-50%) scale(1); }
      50% { opacity: 1; transform: translateY(-50%) scale(1.2); }
    }

    .status-text {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-dim);
      min-height: 20px;
    }

    .status-text .stage-name { color: var(--green); font-weight: 600; }

    #result {
      margin-top: 20px;
      background: var(--surface2);
      border-radius: 10px;
      padding: 16px;
      font-size: 13px;
      max-height: 400px;
      overflow-y: auto;
      display: none;
    }

    #result.show { display: block; }
    #result pre { white-space: pre-wrap; word-break: break-word; }

    .error {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      padding: 12px;
      border-radius: 8px;
      margin-top: 16px;
      display: none;
    }
    .error.show { display: block; }

    .result-section {
      margin-bottom: 16px;
    }
    .result-section h3 {
      font-size: 12px;
      color: var(--green);
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .result-section pre {
      background: var(--bg);
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>AI Compiler</h1>
      <p class="subtitle">Transform natural language into application blueprints</p>
      
      <textarea id="prompt" placeholder="Describe your app... e.g., A medical clinic multi-tenant SaaS with GlobalAdmin, ClinicManager, Doctor roles"></textarea>
      <button id="forgeBtn" onclick="compile()">FORGE IT — ⌘↵</button>
      
      <div class="stages">
        <span class="stage-pill" id="sIntent">Intent</span>
        <span class="stage-pill" id="sDesign">Design</span>
        <span class="stage-pill" id="sSchema">Schema</span>
        <span class="stage-pill" id="sValidate">Validate</span>
        <span class="stage-pill" id="sSimulation">Output</span>
      </div>
      
      <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      
      <div class="status-text" id="statusText">Ready to compile</div>
      
      <div class="error" id="errorMsg"></div>
      <div id="result"></div>
    </div>
  </div>

  <script>
    const stageMap = {
      'intent_extraction': 'sIntent',
      'system_design': 'sDesign',
      'schema_generation': 'sSchema',
      'validation_repair': 'sValidate',
      'simulation': 'sSimulation'
    };

    let currentRequestId = null;
    let eventSource = null;

    async function compile() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) { document.getElementById('prompt').focus(); return; }

      if (eventSource) { eventSource.close(); eventSource = null; }

      const btn = document.getElementById('forgeBtn');
      btn.disabled = true;
      btn.textContent = 'FORGING...';

      document.getElementById('result').classList.remove('show');
      document.getElementById('errorMsg').classList.remove('show');
      resetStagePills();
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('statusText').innerHTML = 'Starting compilation...';

      try {
        const compileRes = await fetch('/compile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, use_llm: true })
        });

        if (!compileRes.ok) throw new Error(`HTTP ${compileRes.status}`);
        
        const { request_id } = await compileRes.json();
        currentRequestId = request_id;

        const sseRes = await fetch(`/compile-stream/${request_id}`);
        if (!sseRes.ok) throw new Error(`SSE connection failed`);

        const reader = sseRes.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                handleProgress(data);
                if (data.type === 'close' || data.type === 'complete') break;
              } catch (e) { console.error('Parse error:', e); }
            }
          }
          if (buffer.includes('"type":"close"') || buffer.includes('"type":"complete"')) break;
        }

        const result = await pollResult(request_id);
        if (result.error) throw new Error(result.error);
        showResult(result);

      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'FORGE IT — ⌘↵';
        if (eventSource) { eventSource.close(); eventSource = null; }
      }
    }

    async function pollResult(requestId, attempts = 0) {
      if (attempts > 30) throw new Error('Timeout waiting for result');
      await new Promise(r => setTimeout(r, 500));
      const res = await fetch(`/compile-result/${requestId}`);
      const data = await res.json();
      if (data.error === 'Still processing') return pollResult(requestId, attempts + 1);
      return data;
    }

    function handleProgress(data) {
      const pillId = stageMap[data.stage];
      const pill = document.getElementById(pillId);

      if (data.type === 'stage_update') {
        if (data.status === 'started') {
          if (pill) pill.classList.add('active');
          document.getElementById('statusText').innerHTML = 
            `<span class="stage-name">${data.stage.replace('_', ' ')}</span> — ${data.details}`;
        } else if (data.status === 'completed') {
          if (pill) { pill.classList.remove('active'); pill.classList.add('done'); }
          document.getElementById('progressFill').style.width = `${data.progress}%`;
          document.getElementById('statusText').innerHTML = `Completed: ${data.details}`;
        } else if (data.status === 'error') {
          showError(data.error);
        }
      } else if (data.type === 'complete') {
        document.getElementById('progressFill').style.width = '100%';
        document.getElementById('statusText').innerHTML = 'Compilation complete!';
      }
    }

    function resetStagePills() {
      document.querySelectorAll('.stage-pill').forEach(p => {
        p.classList.remove('active', 'done');
      });
    }

    function showResult(result) {
      const div = document.getElementById('result');
      let html = '';
      
      if (result.validation) {
        html += `<div class="result-section">
          <h3>Validation</h3>
          <pre>${JSON.stringify(result.validation, null, 2)}</pre>
        </div>`;
      }
      if (result.design) {
        html += `<div class="result-section">
          <h3>Design</h3>
          <pre>${JSON.stringify(result.design, null, 2)}</pre>
        </div>`;
      }
      if (result.schemas) {
        html += `<div class="result-section">
          <h3>Schemas</h3>
          <pre>${JSON.stringify(result.schemas, null, 2)}</pre>
        </div>`;
      }
      
      div.innerHTML = html;
      div.classList.add('show');
    }

    function showError(msg) {
      const div = document.getElementById('errorMsg');
      div.textContent = msg;
      div.classList.add('show');
    }

    document.getElementById('prompt').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) compile();
    });
  </script>
</body>
</html>
